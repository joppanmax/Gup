<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glow Up Era · Vision Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* defaults — overridden by palette tweak via inline vars on .app */
    --cream: #fdf7f3;
    --paper: #fffdfb;
    --ink: #6f4d57;
    --ink-soft: #a98792;
    --rose: #e79aab;
    --rose-deep: #d4738a;
    --blush: #f4ccd6;
    --blush-soft: #fbe6ec;
    --butter: #efe2a0;
    --sage: #bcd1ab;
    --sage-deep: #a3bf8c;
    --lilac: #c3bce0;
    --radius: 18px;
    --title-font: 'Playfair Display', serif;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Quicksand', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 700px at 80% -10%, var(--blush-soft), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, color-mix(in oklab, var(--sage) 50%, var(--cream)), transparent 55%),
      var(--cream);
    background-attachment: fixed;
  }

  .app { position: relative; min-height: 100vh; overflow: hidden; }

  /* ---------- ambient decoration ---------- */
  .decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(48px); opacity: 0.5; }
  .orb.a { width: 360px; height: 360px; background: var(--butter); top: -80px; right: 8%; animation: drift 22s ease-in-out infinite; }
  .orb.b { width: 300px; height: 300px; background: var(--sage); bottom: -60px; left: 4%; animation: drift 26s ease-in-out infinite reverse; }
  .orb.c { width: 240px; height: 240px; background: var(--blush); top: 38%; left: 46%; animation: drift 30s ease-in-out infinite; opacity: 0.32; }
  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-26px, 30px) scale(1.08); }
  }
  .twinkle { position: absolute; color: var(--rose-deep); opacity: 0; animation: twinkle 6s ease-in-out infinite; font-size: 14px; }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
    50% { opacity: 0.55; transform: scale(1) rotate(20deg); }
  }
  .decor-off .decor { display: none; }

  /* ---------- shell ---------- */
  .shell { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 56px 32px 80px; }

  /* ---------- header ---------- */
  .masthead { text-align: center; margin-bottom: 12px; }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--rose-deep); font-weight: 600; margin-bottom: 14px;
  }
  .masthead h1 {
    font-family: var(--title-font); font-weight: 500; font-size: clamp(40px, 6vw, 66px);
    line-height: 1.02; color: var(--ink); letter-spacing: 0.5px;
  }
  .masthead h1 .star { color: var(--rose); font-size: 0.5em; vertical-align: middle; margin: 0 0.28em; }
  .masthead .dates {
    margin-top: 12px; font-size: 15px; color: var(--ink-soft); font-style: italic;
    font-family: var(--title-font);
  }

  /* overall progress strip */
  .overview {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    margin: 34px auto 48px; max-width: 720px;
    background: var(--paper);
    border: 1px solid color-mix(in oklab, var(--rose) 28%, transparent);
    border-radius: 26px; padding: 22px 30px;
    box-shadow: 0 24px 60px -34px color-mix(in oklab, var(--rose-deep) 60%, transparent);
  }
  .overview .ring-wrap { position: relative; flex-shrink: 0; }
  .overview .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .overview .ring-center .num { font-family: var(--title-font); font-size: 26px; color: var(--ink); line-height: 1; }
  .overview .ring-center .lbl { font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-top: 3px; }
  .ov-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .ov-stat {
    text-align: center; min-width: 92px; padding: 10px 14px;
    background: color-mix(in oklab, var(--blush-soft) 70%, var(--paper));
    border: 1px solid color-mix(in oklab, var(--rose) 18%, transparent);
    border-radius: 16px;
  }
  .ov-stat .n { font-family: var(--title-font); font-size: 24px; color: var(--rose-deep); line-height: 1; }
  .ov-stat .t { font-size: 10.5px; letter-spacing: 0.04em; color: var(--ink-soft); margin-top: 5px; }

  .ov-main { display: flex; align-items: center; justify-content: center; gap: 34px; flex-wrap: wrap; }
  .ov-monthnav { display: flex; align-items: center; gap: 14px; }
  .ov-monthnav .ov-arrow {
    width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%; cursor: pointer;
    border: 1px solid color-mix(in oklab, var(--rose) 36%, transparent);
    background: var(--paper); color: var(--rose-deep); font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, transform 0.18s, opacity 0.18s;
  }
  .ov-monthnav .ov-arrow:hover:not(:disabled) { background: var(--blush-soft); transform: scale(1.08); }
  .ov-monthnav .ov-arrow:disabled { opacity: 0.3; cursor: default; }
  .ov-monthnav .ov-month-label {
    font-family: var(--title-font); font-size: 19px; color: var(--ink);
    display: flex; align-items: center; gap: 9px; min-width: 168px; justify-content: center;
  }

  /* ---------- board (masonry) ---------- */
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; align-items: start; }
  @media (max-width: 940px) { .board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 620px) { .board { grid-template-columns: 1fr; } }

  .tile {
    --bloom: 0;
    width: 100%; position: relative;
    background: var(--paper);
    border-radius: calc(var(--radius) + 6px);
    border: 1px solid color-mix(in oklab, var(--rose) calc(16% + var(--bloom) * 20%), transparent);
    overflow: hidden; position: relative;
    box-shadow:
      0 18px 44px -30px color-mix(in oklab, var(--rose-deep) 70%, transparent),
      0 0 calc(var(--bloom) * 46px) color-mix(in oklab, var(--rose) calc(var(--bloom) * 38%), transparent);
    transition: box-shadow 0.6s ease, border-color 0.6s ease, transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .tile:hover { transform: translateY(-4px); }

  .tile-photo { position: relative; width: 100%; overflow: hidden; }
  .tile-photo image-slot { display: block; width: 100%; height: 100%; }
  .tile-photo image-slot::part(placeholder) { font-family: 'Quicksand', sans-serif; }

  /* watercolour wash that blooms in */
  .tile-wash {
    position: absolute; inset: 0; pointer-events: none; mix-blend-mode: multiply;
    opacity: calc(0.12 + var(--bloom) * 0.62);
    transition: opacity 0.7s ease;
  }
  .tile-photo .ph-tint { filter: saturate(calc(0.55 + var(--bloom) * 0.7)); transition: filter 0.7s ease; }

  .tile-pct-badge {
    position: absolute; top: 12px; left: 12px; z-index: 3;
    background: color-mix(in oklab, var(--paper) 82%, transparent);
    backdrop-filter: blur(6px);
    border: 1px solid color-mix(in oklab, var(--rose) 40%, transparent);
    color: var(--rose-deep); font-weight: 700; font-size: 12px;
    padding: 4px 11px; border-radius: 99px; letter-spacing: 0.02em;
  }

  .tile-ribbon {
    position: absolute; top: 12px; right: 12px; z-index: 3;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    padding: 5px 12px; border-radius: 99px;
    box-shadow: 0 8px 20px -8px var(--rose-deep);
    animation: ribbonPop 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes ribbonPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .tile-sparkles { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .tile-sparkles span {
    position: absolute; color: #fff; font-size: 15px;
    text-shadow: 0 1px 6px color-mix(in oklab, var(--rose-deep) 70%, transparent);
    opacity: calc(var(--bloom) * var(--bloom)); transition: opacity 0.7s ease;
    animation: floaty 5s ease-in-out infinite;
  }
  .tile-sparkles span:nth-child(1) { top: 18%; left: 16%; animation-delay: 0s; }
  .tile-sparkles span:nth-child(2) { top: 62%; left: 78%; font-size: 11px; animation-delay: 1.2s; }
  .tile-sparkles span:nth-child(3) { top: 78%; left: 24%; font-size: 13px; animation-delay: 2.1s; }
  .tile-sparkles span:nth-child(4) { top: 30%; left: 64%; font-size: 10px; animation-delay: 0.6s; }
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-7px) rotate(18deg); }
  }

  .tile-body { padding: 16px 18px 18px; cursor: pointer; }
  .tile-head { display: flex; align-items: center; gap: 11px; }
  .tile-icon {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    background: var(--blush-soft);
    border: 1px solid color-mix(in oklab, var(--rose) 26%, transparent);
  }
  .tile-title { font-family: var(--title-font); font-weight: 500; font-size: 19px; color: var(--ink); line-height: 1.1; text-transform: capitalize; }
  .tile-sub { font-size: 12.5px; line-height: 1.5; color: var(--ink-soft); margin: 9px 1px 13px; text-wrap: pretty; }


  .tile-head { display: flex; align-items: center; gap: 11px; }
  .tile-head .tile-title { flex: 1; min-width: 0; }
  .tile-stars { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
  .tile-star { font-size: 16px; line-height: 1; display: flex; align-items: center; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.4s; }
  .tile-star-img { width: 18px; height: 18px; object-fit: contain; display: block; }
  .tile-star.filled { filter: drop-shadow(0 1px 3px rgba(220,100,160,0.5)); transform: scale(1.1); }
  .tile-star.empty  { opacity: 0.2; filter: grayscale(0.5); transform: scale(0.9); }

  .tile-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; font-size: 12px; color: var(--ink-soft);
  }
  .tile-meta .view { color: var(--rose-deep); font-weight: 600; letter-spacing: 0.02em; }
  .tile:hover .tile-meta .view { color: var(--ink); }

  /* ---------- overlay ---------- */
  .overlay-back {
    position: fixed; inset: 0; z-index: 40;
    background: color-mix(in oklab, var(--ink) 30%, transparent);
    backdrop-filter: blur(7px);
    display: flex; align-items: center; justify-content: center; padding: 28px;
    animation: fade 0.25s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .sheet {
    width: min(640px, 100%); max-height: 90vh; overflow-y: auto;
    background: var(--paper); border-radius: 28px; position: relative;
    box-shadow: 0 40px 100px -40px color-mix(in oklab, var(--rose-deep) 80%, transparent);
    animation: rise 0.34s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes rise { from { transform: translateY(26px) scale(0.97); opacity: 0; } to { transform: none; opacity: 1; } }
  .sheet::-webkit-scrollbar { width: 9px; }
  .sheet::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--rose) 40%, transparent); border-radius: 99px; border: 2px solid var(--paper); }

  .sheet-banner {
    position: relative; height: 132px; overflow: hidden;
    display: flex; align-items: flex-end; padding: 18px 26px;
  }
  .sheet-banner .wash { position: absolute; inset: 0; }
  .sheet-banner .spk { position: absolute; color: #fff; opacity: 0.85; text-shadow: 0 1px 8px rgba(0,0,0,.12); animation: floaty 5s ease-in-out infinite; }
  .sheet-banner .head { position: relative; z-index: 2; display: flex; align-items: center; gap: 13px; }
  .sheet-banner .head .ic {
    width: 48px; height: 48px; border-radius: 50%; background: color-mix(in oklab, var(--paper) 86%, transparent);
    display: flex; align-items: center; justify-content: center; font-size: 23px;
    box-shadow: 0 6px 18px -8px rgba(0,0,0,.25);
  }
  .sheet-banner .head h2 { font-family: var(--title-font); font-weight: 600; font-size: 27px; color: #fff; text-transform: capitalize; text-shadow: 0 1px 10px color-mix(in oklab, var(--rose-deep) 60%, transparent); line-height: 1.05; }

  .sheet-close {
    position: absolute; top: 14px; right: 14px; z-index: 5;
    width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
    background: color-mix(in oklab, var(--paper) 85%, transparent); color: var(--ink);
    font-size: 17px; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, background 0.2s;
  }
  .sheet-close:hover { transform: rotate(90deg); background: var(--paper); }

  .sheet-body { padding: 22px 28px 28px; }
  .sheet-sub { font-size: 14px; line-height: 1.6; color: var(--ink-soft); margin-bottom: 4px; text-wrap: pretty; }

  .sub-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .sub-row .sheet-sub { margin-bottom: 0; flex: 1; min-width: 0; }
  .sub-edit-btn {
    appearance: none; border: none; cursor: pointer; flex-shrink: 0; margin-top: 1px;
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--blush-soft); color: var(--rose-deep);
    transition: background 0.2s, color 0.2s;
  }
  .sub-edit-btn:hover { background: var(--rose); color: #fff; }
  .sub-edit-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .sub-input {
    flex: 1; min-width: 0; font-family: 'Quicksand', sans-serif; font-size: 14px; line-height: 1.5;
    color: var(--ink); background: var(--paper);
    border: 1px solid color-mix(in oklab, var(--rose) 28%, transparent);
    border-radius: 11px; padding: 9px 12px; outline: none; resize: vertical; transition: border-color 0.2s;
  }
  .sub-input:focus { border-color: var(--rose); }

  .sheet-progress { display: flex; align-items: center; gap: 16px; margin: 20px 0 8px; }
  .sheet-progress .ring-wrap { position: relative; flex-shrink: 0; }
  .sheet-progress .ring-wrap .pn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--title-font); font-size: 17px; color: var(--rose-deep); }
  .sheet-progress .copy .big { font-family: var(--title-font); font-size: 18px; color: var(--ink); }
  .sheet-progress .copy .small { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }

  .checklist-label {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--rose-deep); font-weight: 700; margin: 24px 0 10px;
  }

  /* month navigator */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin: 22px 0 12px;
  }
  .month-arrow {
    width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%;
    border: 1px solid color-mix(in oklab, var(--rose) 36%, transparent);
    background: var(--paper); color: var(--rose-deep); font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, transform 0.18s, opacity 0.18s;
  }
  .month-arrow:hover:not(:disabled) { background: var(--blush-soft); transform: scale(1.08); }
  .month-arrow:disabled { opacity: 0.3; cursor: default; }
  .month-title {
    flex: 1; text-align: center; font-family: var(--title-font); font-size: 22px;
    color: var(--ink); display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .month-now {
    font-family: 'Quicksand', sans-serif; font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: #fff;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    padding: 3px 9px; border-radius: 99px;
  }

  .month-strip {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 8px;
    scrollbar-width: thin;
  }
  .month-strip::-webkit-scrollbar { height: 5px; }
  .month-strip::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--rose) 36%, transparent); border-radius: 99px; }
  .m-pill {
    flex: 1 0 auto; min-width: 46px; display: flex; flex-direction: column; align-items: center;
    gap: 1px; padding: 7px 6px; border-radius: 12px; cursor: pointer;
    border: 1px solid color-mix(in oklab, var(--rose) 16%, transparent);
    background: var(--blush-soft); color: var(--ink-soft);
    font-family: 'Quicksand', sans-serif; font-size: 12px; font-weight: 600;
    transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.18s;
  }
  .m-pill:hover { transform: translateY(-2px); }
  .m-pill .m-pill-yr { font-size: 8.5px; font-weight: 500; opacity: 0.7; letter-spacing: 0.04em; }
  .m-pill.now { border-color: color-mix(in oklab, var(--rose) 55%, transparent); color: var(--rose-deep); }
  .m-pill.active {
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: #fff; border-color: var(--rose-deep);
    box-shadow: 0 8px 18px -10px var(--rose-deep);
  }
  .m-pill.active .m-pill-yr { opacity: 0.85; }

  .month-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 6px 0 8px; }
  .month-head .checklist-label { margin: 0; }
  .month-count { font-size: 12px; color: var(--ink-soft); font-weight: 600; }

  .empty-tasks {
    text-align: center; padding: 30px 20px; border-radius: 16px;
    border: 1px dashed color-mix(in oklab, var(--rose) 38%, transparent);
    background: color-mix(in oklab, var(--blush-soft) 60%, var(--paper));
  }
  .empty-tasks .et-spark { font-size: 22px; color: var(--rose); margin-bottom: 6px; }
  .empty-tasks .et-title { font-family: var(--title-font); font-size: 16px; color: var(--ink); }
  .empty-tasks .et-sub { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; }
  .check-row {
    display: flex; align-items: flex-start; gap: 12px; padding: 11px 12px;
    border-radius: 14px; cursor: pointer; position: relative;
    transition: background 0.2s;
  }
  .check-row:hover { background: var(--blush-soft); }
  .check-box {
    width: 24px; height: 24px; border-radius: 8px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid color-mix(in oklab, var(--rose) 55%, transparent);
    background: var(--paper); position: relative; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.25s, border-color 0.25s, transform 0.2s;
  }
  .check-box svg { width: 14px; height: 14px; stroke: #fff; stroke-width: 3.4; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 22; stroke-dashoffset: 22; transition: stroke-dashoffset 0.3s ease 0.05s; }
  .check-row.done .check-box { background: linear-gradient(135deg, var(--rose), var(--rose-deep)); border-color: var(--rose-deep); animation: pop 0.42s cubic-bezier(.34,1.7,.5,1); }
  .check-row.done .check-box svg { stroke-dashoffset: 0; }
  @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.32); } 100% { transform: scale(1); } }
  .check-row .ctext { font-size: 14.5px; line-height: 1.5; color: var(--ink); padding-top: 2px; transition: color 0.3s; }
  .check-row.done .ctext { color: var(--ink-soft); text-decoration: line-through; text-decoration-color: color-mix(in oklab, var(--rose) 60%, transparent); }

  /* sparkle burst on check */
  .burst { position: absolute; left: 18px; top: 18px; pointer-events: none; z-index: 6; }
  .burst i {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    background: var(--rose-deep); opacity: 0;
    animation: burst 0.66s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--bx), var(--by)) scale(0.2); }
  }

  .notes {
    width: 100%; margin-top: 22px; font-family: 'Quicksand', sans-serif; font-size: 13.5px;
    color: var(--ink); background: var(--blush-soft);
    border: 1px solid color-mix(in oklab, var(--rose) 24%, transparent);
    border-radius: 14px; padding: 13px 15px; resize: vertical; min-height: 74px; outline: none;
    line-height: 1.5;
  }
  .notes:focus { border-color: var(--rose); }
  .notes::placeholder { color: var(--ink-soft); }

  /* ---- task editing ---- */
  .month-head-right { display: flex; align-items: center; gap: 10px; }
  .edit-toggle {
    appearance: none; cursor: pointer; font-family: 'Quicksand', sans-serif;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 5px 13px; border-radius: 99px;
    border: 1px solid color-mix(in oklab, var(--rose) 42%, transparent);
    background: var(--paper); color: var(--rose-deep);
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .edit-toggle:hover { background: var(--blush-soft); }
  .edit-toggle.on { background: linear-gradient(135deg, var(--rose), var(--rose-deep)); color: #fff; border-color: transparent; }

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */


/* ── image-slot localStorage persistence shim ──────────────────────────────
   image-slot.js reads state via fetch('.image-slots.state.json') and writes
   via window.omelette.writeFile. We intercept both to use localStorage so
   thumbnails survive page closes without any server or sidecar file.
---------------------------------------------------------------------------- */
(function() {
  const LS_KEY = 'glowup_image_slots';
  window.omelette = {
    writeFile: function(filename, data) {
      if (filename.includes('.state.json')) localStorage.setItem(LS_KEY, data);
      return Promise.resolve();
    }
  };
  const _fetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    const url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.includes('.image-slots.state.json')) {
      const body = localStorage.getItem(LS_KEY) || '{}';
      return Promise.resolve(new Response(body, {
        status: 200, headers: { 'Content-Type': 'application/json' }
      }));
    }
    return _fetch(input, init);
  };
})();

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {

    connectedCallback() {

      // cannot persist, and two id-less slots would share nothing.

      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()

      if (this._esc) document.removeEventListener('keydown', this._esc, true);

    // add/remove symmetric and the depth counter correct.

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.

      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);

        this._img.style.height = '100%';

        this._img.style.top = '50%';

      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;

      const h = (g.ih * k / g.fh * 100) + '%';

    _render() {

      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).

      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {

      }

      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.

        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }

        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const TWEAKS_KEY = 'glowup_tweaks';
  const stored = React.useMemo(() => { try { return JSON.parse(localStorage.getItem(TWEAKS_KEY)); } catch { return null; } }, []);
  const [values, setValues] = React.useState({ ...defaults, ...(stored || {}) });
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => {
      const next = { ...prev, ...edits };
      try { localStorage.setItem(TWEAKS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

      <div className="twk-sect">{label}</div>

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script type="text/babel">/* glowup components — exported to window at end */
const { useState, useRef, useEffect } = React;

function ProgressRing({ size = 88, stroke = 8, pct = 0, track, color }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - pct / 100);
  return (
    <svg width={size} height={size} style={{ display: 'block', transform: 'rotate(-90deg)' }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
      <circle
        cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
        style={{ transition: 'stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)' }}
      />
    </svg>
  );
}

function GoalWash({ tint }) {
  return (
    <div
      className="tile-wash"
      style={{ background: `linear-gradient(155deg, var(${tint[0]}), var(${tint[1]}))` }}
    ></div>
  );
}

/* merge a goal's default task lists with any per-month user edits in state */
function resolveTasks(goal, gstate) {
  const out = {};
  const base = goal.tasks || {};
  for (const k in base) out[k] = base[k];
  const ov = (gstate && gstate.tasks) || {};
  for (const k in ov) out[k] = ov[k];
  return out;
}

/* count done/total across every month for a tasks map */
function goalProgress(tasksMap, checks) {
  let total = 0, done = 0;
  for (const k in tasksMap) {
    const arr = tasksMap[k] || [];
    total += arr.length;
    const c = (checks && checks[k]) || [];
    done += arr.reduce((a, _, i) => a + (c[i] ? 1 : 0), 0);
  }
  return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
}

function BoardTile({ goal, gstate, onOpen, monthKey }) {
  const checks = gstate.checks || {};
  const { total, done, pct } = goalProgress(resolveTasks(goal, gstate), checks);
  const bloom = total ? done / total : 0;
  const bloomed = total > 0 && done === total;
  const slotId = 'slot-' + goal.id;
  const subs = gstate.subs || {};
  const sub = (subs[monthKey] !== undefined && subs[monthKey] !== null) ? subs[monthKey] : goal.sub;

  return (
    <div className="tile" style={{ '--bloom': bloom }}>
      <div
        className="tile-photo"
        style={{ height: goal.photoH, cursor: 'default' }}
      >
        <image-slot
          id={slotId}
          shape="rect"
          fit="cover"
          class="ph-tint"
          src={goal.img || undefined}
          placeholder={'drop a ' + goal.short + ' photo  \u2726'}
          style={{ width: '100%', height: '100%' }}
        ></image-slot>
        <GoalWash tint={goal.tint} />
        <div className="tile-sparkles">
          <span>&#10022;</span><span>&#10023;</span><span>&#10022;</span><span>&#10023;</span>
        </div>
        <div className="tile-pct-badge">{pct}%</div>
        {bloomed && <div className="tile-ribbon">in full bloom &#10047;</div>}
        <button
          className="tile-edit-photo"
          title="Change photo"
          onClick={(e) => {
            e.stopPropagation();
            const slot = document.getElementById('slot-' + goal.id);
            if (!slot) return;
            // Try shadow root file input first, then fall back to a click on the slot
            const inp = slot.shadowRoot && slot.shadowRoot.querySelector('input[type=file]');
            if (inp) { inp.click(); } else { slot.click(); }
          }}
        >&#x1F338;</button>
        <div className="tile-reframe-hint">double-click to reposition</div>
      </div>
      <div className="tile-body" onClick={onOpen} role="button" tabIndex={0}
           onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpen(); } }}>
        <div className="tile-head">
          <div className="tile-icon">{goal.icon}</div>
          <div className="tile-title">{goal.title}</div>
          <div className="tile-stars">
            {[1,2,3,4,5].map(i => {
              const filled = i <= Math.round(pct / 20);
              return (
                <span key={i} className={'tile-star ' + (filled ? 'filled' : 'empty')}>
                  {window.__STAR_IMG__
                    ? <img src={window.__STAR_IMG__} className="tile-star-img" alt="★" />
                    : '★'}
                </span>
              );
            })}
          </div>
        </div>
        <p className="tile-sub">{sub}</p>
        <div className="tile-meta">
          <span>{done}/{total} tasks</span>
        </div>
      </div>
    </div>
  );
}

function CheckRow({ text, checked, onToggle }) {
  const [bursts, setBursts] = useState([]);
  const bid = useRef(0);

  function handle() {
    if (!checked) {
      const id = bid.current++;
      const parts = Array.from({ length: 7 }, (_, i) => {
        const a = (Math.PI * 2 * i) / 7 + Math.random() * 0.5;
        const d = 20 + Math.random() * 16;
        return { x: Math.cos(a) * d, y: Math.sin(a) * d };
      });
      setBursts((b) => [...b, { id, parts }]);
      setTimeout(() => setBursts((b) => b.filter((x) => x.id !== id)), 700);
    }
    onToggle(!checked);
  }

  return (
    <div className={'check-row' + (checked ? ' done' : '')} onClick={handle}>
      <div className="check-box">
        <svg viewBox="0 0 24 24"><path d="M4 12.5 L10 18 L20 6" /></svg>
      </div>
      <div className="ctext">{text}</div>
      {bursts.map((b) => (
        <div className="burst" key={b.id}>
          {b.parts.map((p, i) => (
            <i key={i} style={{ '--bx': p.x + 'px', '--by': p.y + 'px', animationDelay: (i * 8) + 'ms' }}></i>
          ))}
        </div>
      ))}
    </div>
  );
}

function DetailOverlay({ goal, gstate, months, currentIndex, onToggleTask, onNote, onClose, onAddTask, onEditTask, onDeleteTask, onEditSub }) {
  const [sel, setSel] = useState(currentIndex);
  const [editing, setEditing] = useState(false);
  const [editingSub, setEditingSub] = useState(false);

  useEffect(() => {
    function esc(e) { if (e.key === 'Escape') { if (editing) setEditing(false); else onClose(); } }
    window.addEventListener('keydown', esc);
    return () => window.removeEventListener('keydown', esc);
  }, [onClose, editing]);

  const checks = gstate.checks || {};
  const allTasks = resolveTasks(goal, gstate);
  const overall = goalProgress(allTasks, checks);

  const month = months[sel];
  const tasks = allTasks[month.key] || [];
  const subs = gstate.subs || {};
  const sub = (subs[month.key] !== undefined && subs[month.key] !== null) ? subs[month.key] : goal.sub;
  const mChecks = checks[month.key] || [];
  const mDone = tasks.reduce((a, _, i) => a + (mChecks[i] ? 1 : 0), 0);
  const isNow = sel === currentIndex;

  return (
    <div className="overlay-back" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet">
        <button className="sheet-close" onClick={onClose} aria-label="close">&#10005;</button>
        <div className="sheet-banner">
          <div className="wash" style={{ background: `linear-gradient(135deg, var(${goal.tint[0]}), var(${goal.tint[1]}))` }}></div>
          <span className="spk" style={{ top: '20%', left: '70%', fontSize: 16 }}>&#10022;</span>
          <span className="spk" style={{ top: '55%', left: '86%', fontSize: 12, animationDelay: '1s' }}>&#10023;</span>
          <span className="spk" style={{ top: '30%', left: '40%', fontSize: 11, animationDelay: '2s' }}>&#10022;</span>
          <div className="head">
            <div className="ic">{goal.icon}</div>
            <h2>{goal.title}</h2>
          </div>
        </div>
        <div className="sheet-body">
          <div className="sub-row">
            {editingSub ? (
              <textarea
                key={month.key}
                className="sub-input"
                rows={2}
                autoFocus
                defaultValue={sub}
                placeholder={'description for ' + month.label + '\u2026'}
                onBlur={(e) => { onEditSub(goal.id, month.key, e.target.value); setEditingSub(false); }}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onEditSub(goal.id, month.key, e.target.value); setEditingSub(false); }
                  if (e.key === 'Escape') { e.preventDefault(); setEditingSub(false); }
                }}
              ></textarea>
            ) : (
              <p className="sheet-sub">{sub}</p>
            )}
            {!editingSub && (
              <button className="sub-edit-btn" aria-label="edit this month's description" title="edit this month's description"
                onClick={() => setEditingSub(true)}>
                <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>
              </button>
            )}
          </div>

          <div className="sheet-progress">
            <div className="ring-wrap">
              <ProgressRing size={64} stroke={7} pct={overall.pct}
                track="var(--blush-soft)" color="var(--rose-deep)" />
              <div className="pn">{overall.pct}%</div>
            </div>
            <div className="copy">
              <div className="big">your year so far</div>
              <div className="small">{overall.done} of {overall.total} tasks across all months</div>
            </div>
          </div>

          {/* month navigator */}
          <div className="month-nav">
            <button className="month-arrow" disabled={sel === 0}
              onClick={() => setSel((s) => Math.max(0, s - 1))} aria-label="previous month">&#8249;</button>
            <div className="month-title">
              {month.label}
              {isNow && <span className="month-now">this month</span>}
            </div>
            <button className="month-arrow" disabled={sel === months.length - 1}
              onClick={() => setSel((s) => Math.min(months.length - 1, s + 1))} aria-label="next month">&#8250;</button>
          </div>

          <div className="month-strip">
            {months.map((m, i) => (
              <button
                key={m.key}
                className={'m-pill' + (i === sel ? ' active' : '') + (i === currentIndex ? ' now' : '')}
                onClick={() => setSel(i)}
                title={m.label}
              >{m.short}<span className="m-pill-yr">{m.yr}</span></button>
            ))}
          </div>

          <div className="month-head">
            <div className="checklist-label">tasks &middot; {month.label}</div>
            <div className="month-head-right">
              {!editing && tasks.length > 0 && <div className="month-count">{mDone}/{tasks.length} done</div>}
              <button className={'edit-toggle' + (editing ? ' on' : '')}
                onClick={() => setEditing((v) => !v)}>{editing ? 'done' : 'edit'}</button>
            </div>
          </div>

          {editing ? (
            <div className="edit-list">
              <div className="edit-hint">Edit, remove, or add tasks for {month.label}.</div>
              {tasks.map((m, i) => (
                <div className="edit-row" key={month.key + '_e_' + i}>
                  <input
                    className="task-input"
                    value={m}
                    placeholder="task description&hellip;"
                    onChange={(e) => onEditTask(goal.id, month.key, i, e.target.value)}
                  />
                  <button className="del-task" aria-label="delete task"
                    onClick={() => onDeleteTask(goal.id, month.key, i)}>&#10005;</button>
                </div>
              ))}
              <button className="add-task" onClick={() => onAddTask(goal.id, month.key)}>+ add a task</button>
            </div>
          ) : tasks.length === 0 ? (
            <div className="empty-tasks">
              <div className="et-spark">&#10047;</div>
              <div className="et-title">No tasks for {month.label} yet</div>
              <div className="et-sub">Tap &ldquo;edit&rdquo; above to add this month&rsquo;s tasks.</div>
            </div>
          ) : (
            tasks.map((m, i) => (
              <CheckRow key={month.key + '_' + i} text={m} checked={!!mChecks[i]}
                onToggle={(v) => onToggleTask(goal.id, month.key, i, v)} />
            ))
          )}

          <textarea
            className="notes"
            placeholder={'notes, wins, reflections\u2026'}
            value={gstate.notes || ''}
            onChange={(e) => onNote(goal.id, e.target.value)}
          ></textarea>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { ProgressRing, BoardTile, CheckRow, DetailOverlay, goalProgress, resolveTasks });
</script>
